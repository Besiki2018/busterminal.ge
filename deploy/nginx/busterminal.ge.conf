server {
    listen 80;
    listen [::]:80;
    server_name busterminal.ge www.busterminal.ge;

    root /var/www/busterminal.ge/dist;
    index index.html;

    access_log /var/log/nginx/busterminal.ge.access.log;
    error_log /var/log/nginx/busterminal.ge.error.log;

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    location ~* \.(?:css|gif|ico|jpg|jpeg|js|png|svg|webp|woff|woff2|ttf|xml)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
