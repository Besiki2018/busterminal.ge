server {
    listen 80;
    listen [::]:80;
    server_name cms.busterminal.ge;

    root /var/www/busterminal.ge/backend/public;
    index index.php;

    access_log /var/log/nginx/cms.busterminal.ge.access.log;
    error_log /var/log/nginx/cms.busterminal.ge.error.log;

    client_max_body_size 32m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
